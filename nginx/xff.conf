# Shared XFF trust logic — included by every nginx instance.
#
# Only the three nginx containers are trusted proxies.
# Any other client (including the Docker bridge gateway) is untrusted,
# so its X-Forwarded-For header is silently discarded.

geo $from_trusted_proxy {
    default          0;
    172.30.0.11      1;   # nginx1
    172.30.0.12      1;   # nginx2
    172.30.0.13      1;   # nginx3
}

# If the immediate client is trusted, keep the header it sent.
# Otherwise start with the actual peer address and discard any spoofed header.
map $from_trusted_proxy $xff_base {
    1       $http_x_forwarded_for;
    0       $remote_addr;
}

# Build the outgoing X-Forwarded-For value.
#   trusted   → "<preserved chain>, <this nginx>"
#   untrusted → "<client>, <this nginx>"   (chain reset — spoofed header gone)
map $xff_base $clean_x_forwarded_for {
    ""      "$remote_addr, $server_addr";
    default "$xff_base, $server_addr";
}
