user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/xff.conf;

    log_format xff '$remote_addr "$request" '
                   'in_xff="$http_x_forwarded_for" '
                   'out_xff="$clean_x_forwarded_for"';
    access_log /var/log/nginx/access.log xff;

    server {
        listen 80;
        server_name _;

        # Chain: user → nginx2 → app
        location /app {
            proxy_pass       http://172.30.0.20:8080;
            proxy_set_header X-Forwarded-For $clean_x_forwarded_for;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header Host            $host;
        }

        # Chain: user → nginx2 → nginx3 → app
        #   also used as the second hop in: nginx1 → nginx2 → nginx3 → app
        location /via-nginx3 {
            proxy_pass       http://172.30.0.13/app;
            proxy_set_header X-Forwarded-For $clean_x_forwarded_for;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header Host            $host;
        }
    }
}
